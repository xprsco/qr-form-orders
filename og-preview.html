<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200">
<title>OG Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f1728 0%, #1a2236 40%, #1e2a42 100%);
  color: #ffffff;
  display: flex;
  flex-direction: column;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 48px 0 48px;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo-text {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(90deg, #00C8FF, #00E5A0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 16px;
  color: #7a8fa6;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.badge {
  background: rgba(0,200,255,0.12);
  border: 1px solid rgba(0,200,255,0.3);
  color: #00C8FF;
  font-size: 13px;
  font-weight: 700;
  padding: 6px 16px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

.main {
  flex: 1;
  display: flex;
  padding: 28px 48px 0 48px;
  gap: 40px;
}

.stats-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
  justify-content: center;
}

.kpi-row {
  display: flex;
  gap: 20px;
}

.kpi {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 22px 24px;
}

.kpi-label {
  font-size: 12px;
  font-weight: 700;
  color: #7a8fa6;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 6px;
}

.kpi-value {
  font-size: 42px;
  font-weight: 900;
  letter-spacing: -1px;
}

.kpi-value.cyan { color: #00C8FF; }
.kpi-value.green { color: #00E5A0; }
.kpi-value.amber { color: #FFB800; }

.kpi-sub {
  font-size: 13px;
  color: #5a6f85;
  font-weight: 500;
  margin-top: 4px;
}

.products-col {
  width: 460px;
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: center;
}

.product-card {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 370px;
}

.product-img {
  flex: 1;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0a14;
  padding: 8px;
}

.product-img img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.product-info {
  padding: 14px 16px;
  text-align: center;
}

.product-name {
  font-size: 13px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.3;
}

.product-stat {
  font-size: 11px;
  color: #7a8fa6;
  font-weight: 600;
  margin-top: 4px;
}

.bottom-bar {
  padding: 0 48px 24px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.live-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #00E5A0;
  margin-right: 8px;
  box-shadow: 0 0 8px rgba(0,229,160,0.5);
}

.bottom-text {
  font-size: 13px;
  color: #5a6f85;
  font-weight: 500;
}

.bottom-url {
  font-size: 13px;
  color: #3a5068;
  font-weight: 600;
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo-area">
    <div class="logo-text">XPRS</div>
    <div class="subtitle">QR Form Orders</div>
  </div>
  <div class="badge">7-Eleven DSD</div>
</div>

<div class="main">
  <div class="stats-col">
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Stores</div>
        <div class="kpi-value cyan" id="stores">--</div>
        <div class="kpi-sub">unique locations</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Cases</div>
        <div class="kpi-value green" id="cases">--</div>
        <div class="kpi-sub">ordered</div>
      </div>
    </div>
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Units</div>
        <div class="kpi-value amber" id="units">--</div>
        <div class="kpi-sub">total pieces</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Orders</div>
        <div class="kpi-value cyan" id="orders">--</div>
        <div class="kpi-sub">form submissions</div>
      </div>
    </div>
  </div>

  <div class="products-col">
    <div class="product-card">
      <div class="product-img">
        <img src="assets/bao-bun.png" alt="Bao Bun's Rainbow Surprise" />
      </div>
      <div class="product-info">
        <div class="product-name">Bao Bun's Rainbow Surprise</div>
        <div class="product-stat" id="bb-stat">--</div>
      </div>
    </div>
    <div class="product-card">
      <div class="product-img">
        <img src="assets/need-2-squeeze.png" alt="Need-2-Squeeze FDU" />
      </div>
      <div class="product-info">
        <div class="product-name">Need-2-Squeeze FDU</div>
        <div class="product-stat" id="n2s-stat">--</div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="bottom-text"><span class="live-dot"></span>Live Dashboard</div>
  <div class="bottom-url">xprsco.github.io/qr-form-orders</div>
</div>

<!-- Pull stats from the same RAW_ORDERS in index.html via a small inline script -->
<script>
// This script is only used during Puppeteer screenshot generation.
// It fetches index.html, extracts RAW_ORDERS, and computes KPIs.
fetch('index.html')
  .then(r => r.text())
  .then(html => {
    const match = html.match(/const RAW_ORDERS\s*=\s*(\[[\s\S]*?\]);\s*\n/);
    if (!match) return;
    const orders = eval(match[1]);

    const stores = new Set(orders.map(o => o.store)).size;
    const cases = orders.reduce((s, o) => s + o.qty, 0);
    const units = orders.reduce((s, o) => {
      if (o.product.includes("Bao Bun")) return s + o.qty * 48;
      if (o.product.includes("Need-2-Squeeze")) return s + o.qty * 132;
      return s;
    }, 0);

    const bb = orders.filter(o => o.product.includes("Bao Bun"));
    const n2s = orders.filter(o => o.product.includes("Need-2-Squeeze"));
    const bbCases = bb.reduce((s, o) => s + o.qty, 0);
    const n2sCases = n2s.reduce((s, o) => s + o.qty, 0);

    document.getElementById('stores').textContent = stores;
    document.getElementById('cases').textContent = cases;
    document.getElementById('units').textContent = units.toLocaleString();
    document.getElementById('orders').textContent = orders.length;
    document.getElementById('bb-stat').textContent = bbCases + ' cases / ' + (bbCases * 48).toLocaleString() + ' units';
    document.getElementById('n2s-stat').textContent = n2sCases + ' cases / ' + (n2sCases * 132).toLocaleString() + ' units';
  });
</script>

</body>
</html>
